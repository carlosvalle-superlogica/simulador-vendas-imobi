<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Avançado - Closer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function SimuladorAvançado() {
            // --- ESTADOS (VARIÁVEIS QUE O CLOSER VAI PREENCHER) ---
            const [tipoContrato, setTipoContrato] = useState('Mensal');
            const [numContratos, setNumContratos] = useState(1);
            const [planoErp, setPlanoErp] = useState('Básico');
            const [planoAtendeErp, setPlanoAtendeErp] = useState('100');
            const [regiao, setRegiao] = useState('SP');

            // --- LÓGICA DE PREÇOS (Você precisará ajustar estes valores baseados na sua planilha) ---
            
            // 1. Tabela de Preços do ERP
            const getPrecoERP = () => {
                const precos = {
                    'Básico': 500,
                    'Intermediário': 800,
                    'Avançado': 1200
                };
                return precos[planoErp] || 0;
            };

            // 2. Tabela de Preços do Atende
            const getPrecoAtende = () => {
                const precos = {
                    '100': 350,
                    '300': 600,
                    '500': 850,
                    '1000': 1450
                };
                return precos[planoAtendeErp] || 0;
            };

            // 3. Regra de Desconto por Volume de Contratos
            const getDescontoVolume = () => {
                if (numContratos >= 10) return 0.15; // 15% de desconto
                if (numContratos >= 5) return 0.10;  // 10% de desconto
                return 0; // Sem desconto
            };

            // 4. Regra de Desconto por Região (Exemplo)
            const getDescontoRegiao = () => {
                const descontos = {
                    'SP': 0,
                    'SUL_SUDESTE': 0.10,
                    'CENTRO_OESTE': 0.15,
                    'NORTE_NORDESTE': 0.20
                };
                return descontos[regiao] || 0;
            };

            // --- CÁLCULOS FINAIS ---
            const valorBaseERP = getPrecoERP();
            const valorBaseAtende = getPrecoAtende();
            const valorTotalBase = (valorBaseERP + valorBaseAtende) * numContratos;

            // Aplica os descontos (Ajuste a ordem dos cálculos conforme sua planilha)
            let descontoAplicado = valorTotalBase * getDescontoVolume();
            descontoAplicado += (valorTotalBase - descontoAplicado) * getDescontoRegiao();

            const valorFinal = valorTotalBase - descontoAplicado;

            return (
                <div className="max-w-6xl mx-auto bg-white rounded-xl shadow-2xl overflow-hidden flex flex-col lg:flex-row">
                    
                    {/* LADO ESQUERDO: Formulário de Configuração */}
                    <div className="w-full lg:w-2/3 p-6 md:p-10 border-r border-gray-200">
                        <h1 className="text-3xl font-extrabold text-gray-900 mb-8 border-b pb-4">Simulador de Proposta - CRM/ERP</h1>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            
                            {/* TIPO DE CONTRATO */}
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">TIPO DE CONTRATO</label>
                                <select 
                                    className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                                    value={tipoContrato} onChange={(e) => setTipoContrato(e.target.value)}>
                                    <option value="Mensal">Mensal</option>
                                    <option value="Semestral">Semestral</option>
                                    <option value="Anual">Anual</option>
                                </select>
                            </div>

                            {/* Nº CONTRATOS */}
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">Nº CONTRATOS (A partir de)</label>
                                <input 
                                    type="number" min="1" 
                                    className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                                    value={numContratos} onChange={(e) => setNumContratos(Number(e.target.value))} />
                            </div>

                            {/* PLANO ERP */}
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">PLANO ERP</label>
                                <select 
                                    className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                                    value={planoErp} onChange={(e) => setPlanoErp(e.target.value)}>
                                    <option value="Básico">Plano Básico</option>
                                    <option value="Intermediário">Plano Intermediário</option>
                                    <option value="Avançado">Plano Avançado</option>
                                </select>
                            </div>

                            {/* PLANO ATENDE ERP */}
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">PLANO ATENDE</label>
                                <select 
                                    className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                                    value={planoAtendeErp} onChange={(e) => setPlanoAtendeErp(e.target.value)}>
                                    <option value="100">100 Contatos</option>
                                    <option value="300">300 Contatos</option>
                                    <option value="500">500 Contatos</option>
                                    <option value="1000">1000 Contatos</option>
                                </select>
                            </div>

                            {/* REGIÃO */}
                            <div className="md:col-span-2">
                                <label className="block text-sm font-bold text-gray-700 mb-2">REGIÃO DO CLIENTE</label>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                                    {[
                                        { id: 'SP', label: 'São Paulo' },
                                        { id: 'SUL_SUDESTE', label: 'Sul/Sudeste' },
                                        { id: 'CENTRO_OESTE', label: 'Centro-Oeste' },
                                        { id: 'NORTE_NORDESTE', label: 'Norte/Nordeste' }
                                    ].map((reg) => (
                                        <button key={reg.id} onClick={() => setRegiao(reg.id)}
                                            className={`p-2 rounded-lg text-sm font-semibold transition-all ${regiao === reg.id ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                                            {reg.label}
                                        </button>
                                    ))}
                                </div>
                            </div>

                        </div>
                    </div>

                    {/* LADO DIREITO: Resumo Financeiro */}
                    <div className="w-full lg:w-1/3 bg-gray-50 p-6 md:p-10 flex flex-col justify-center border-t lg:border-t-0 lg:border-l border-gray-200">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 text-center">
                            <h2 className="text-sm font-extrabold text-blue-600 uppercase tracking-widest mb-4">Resumo do Investimento</h2>
                            
                            <div className="flex justify-between text-gray-500 mb-2 text-sm">
                                <span>Valor Base:</span>
                                <span>R$ {valorTotalBase.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</span>
                            </div>
                            
                            <div className="flex justify-between text-red-500 mb-6 text-sm">
                                <span>Descontos Aplicados:</span>
                                <span>- R$ {descontoAplicado.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</span>
                            </div>

                            <div className="pt-4 border-t border-gray-100">
                                <span className="block text-gray-500 text-sm mb-1">Valor Final ({tipoContrato}):</span>
                                <div className="text-4xl font-black text-gray-900">
                                    R$ {valorFinal.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                                </div>
                            </div>
                        </div>

                        <button className="mt-8 w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg transition-transform transform hover:scale-105">
                            Gerar Proposta PDF
                        </button>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SimuladorAvançado />);
    </script>
</body>
</html>
