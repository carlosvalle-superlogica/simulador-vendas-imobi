<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Master - Closer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // --- BANCO DE DADOS ---
        const bdCrm = [
            { id: 'Basic', nome: 'CRM - Basic (150 Imóveis)', mensal: 299, impl: 269 },
            { id: 'Economico', nome: 'CRM - Econômico (300 Imóveis)', mensal: 349, impl: 429 },
            { id: 'Essencial', nome: 'CRM - Essencial (700 Imóveis)', mensal: 599, impl: 739 },
            { id: 'Enterprise', nome: 'CRM - Enterprise (Ilimitado)', mensal: 999, impl: 1059 },
        ];

        const bdAtende = [
            { id: 100, nome: 'Assistente 100', mensal: 350, impl: 700 },
            { id: 200, nome: 'Assistente 200', mensal: 450, impl: 900 },
            { id: 300, nome: 'Assistente 300', mensal: 660, impl: 1320 },
            { id: 400, nome: 'Assistente 400', mensal: 720, impl: 1440 },
            { id: 500, nome: 'Assistente 500', mensal: 850, impl: 1700 },
            { id: 600, nome: 'Assistente 600', mensal: 990, impl: 1980 },
            { id: 700, nome: 'Assistente 700', mensal: 1120, impl: 2240 },
            { id: 800, nome: 'Assistente 800', mensal: 1240, impl: 2480 },
            { id: 900, nome: 'Assistente 900', mensal: 1350, impl: 2700 },
            { id: 1000, nome: 'Assistente 1000', mensal: 1450, impl: 2900 },
        ];

        const gerarBdErp = () => {
            const planos = [
                { nome: 'Basic Plus (Com PJBank) - 25', mensal: 139, adesao: 699 },
                { nome: 'Basic (Sem PJBank) - 25', mensal: 159, adesao: 699 },
                { nome: 'Econômico - 50', mensal: 279, adesao: 699 },
                { nome: 'Econômico Plus - 100', mensal: 389, adesao: 699 },
                { nome: 'Essencial - 200', mensal: 499, adesao: 990 },
            ];
            for(let i = 300; i <= 5000; i += 100) {
                let m = 739 + ((i - 300)/100 * 190);
                if(i === 3600) m = 6876; if(i === 3700) m = 7067; if(i === 3800) m = 7258;
                if(i === 3900) m = 7449; if(i === 4000) m = 7640; if(i === 4100) m = 7831;
                if(i === 4200) m = 8022; if(i === 4300) m = 8213; if(i === 4400) m = 8404;
                if(i === 4500) m = 8595; if(i === 4600) m = 8786; if(i === 4700) m = 8977;
                if(i === 4800) m = 9168; if(i === 4900) m = 9359; if(i === 5000) m = 9550;
                planos.push({ nome: `Enterprise ${i}`, mensal: m, adesao: 1490 });
            }
            return planos;
        };
        const bdErp = gerarBdErp();

        function App() {
            // Estados Principais
            const [ancora, setAncora] = useState('AMBOS');
            const [regiao, setRegiao] = useState('SP');
            const [incluirAtende, setIncluirAtende] = useState(true);
            
            // Seleções de Planos
            const [selCrm, setSelCrm] = useState(bdCrm[0].id);
            const [selErp, setSelErp] = useState(bdErp[0].nome);
            const [selAtende, setSelAtende] = useState(bdAtende[0].id);

            // Condições de Fechamento
            const [ciclo, setCiclo] = useState('Mensal');
            const [descAdesao, setDescAdesao] = useState(0); 
            const [promoCrm, setPromoCrm] = useState('0_MESES'); // Lógica nova de Ramp-up

            // Cálculos
            const valores = useMemo(() => {
                let mCrm = 0, iCrm = 0, mErp = 0, iErp = 0, mAtende = 0, iAtende = 0;
                let descBundlePerc = 0;

                // Busca ERP
                if (ancora === 'ERP' || ancora === 'AMBOS') {
                    const p = bdErp.find(x => x.nome === selErp);
                    mErp = p.mensal; iErp = p.adesao;
                }

                // Busca CRM
                if (ancora === 'CRM' || ancora === 'AMBOS') {
                    const p = bdCrm.find(x => x.id === selCrm);
                    mCrm = p.mensal; iCrm = p.impl;
                }

                // Busca Atende e aplica desconto de Região/Bundle
                if (incluirAtende) {
                    const p = bdAtende.find(x => x.id === Number(selAtende));
                    mAtende = p.mensal; iAtende = p.impl;
                    const regras = {
                        CRM: { SP: 0.20, SUL_SUDESTE: 0.40, CENTRO_OESTE: 0.40, NORTE_NORDESTE: 0.70 },
                        ERP: { SP: 0.00, SUL_SUDESTE: 0.80, CENTRO_OESTE: 0.90, NORTE_NORDESTE: 1.00 },
                        AMBOS: { SP: 0.50, SUL_SUDESTE: 0.90, CENTRO_OESTE: 1.00, NORTE_NORDESTE: 1.00 }
                    };
                    descBundlePerc = regras[ancora][regiao];
                }

                const mAtendeFinal = mAtende - (mAtende * descBundlePerc);
                
                // === LÓGICA NOVA: DESCONTO CRM RAMP-UP ===
                let mCrmPromocional = mCrm;
                let infoPromo = '';
                
                if (ancora === 'CRM' || ancora === 'AMBOS') {
                    if (promoCrm === '50_3M') { mCrmPromocional = mCrm * 0.5; infoPromo = '3 meses'; }
                    else if (promoCrm === '50_6M') { mCrmPromocional = mCrm * 0.5; infoPromo = '6 meses'; }
                    else if (promoCrm === '50_9M') { mCrmPromocional = mCrm * 0.5; infoPromo = '9 meses'; }
                    else if (promoCrm === '50_12M') { mCrmPromocional = mCrm * 0.5; infoPromo = '12 meses'; }
                    else if (promoCrm === '100_ISENCAO') { mCrmPromocional = 0; infoPromo = 'Vitalícia'; }
                }

                // Subtotais
                const subtotalMensalBase = mCrm + mErp + mAtendeFinal; // Valor Cheio
                const subtotalMensalPromo = mCrmPromocional + mErp + mAtendeFinal; // Valor durante a promoção

                // Desconto Ciclo Anual (Aplica sobre o valor já com a promoção do CRM se houver)
                const descCicloPerc = ciclo === 'Anual' ? 0.20 : 0;
                
                const totalMensalFinalBase = subtotalMensalBase - (subtotalMensalBase * descCicloPerc); // Valor que ficará depois
                const totalMensalFinalPromo = subtotalMensalPromo - (subtotalMensalPromo * descCicloPerc); // Valor inicial

                // Adesão
                const totalAdesaoBase = iCrm + iErp + (incluirAtende ? iAtende : 0);
                const totalAdesaoFinal = totalAdesaoBase - (totalAdesaoBase * descAdesao);

                return {
                    mCrm, mCrmPromocional, infoPromo, mErp, mAtende, mAtendeFinal, descBundlePerc,
                    subtotalMensalBase, subtotalMensalPromo, descCicloPerc, 
                    totalMensalFinalBase, totalMensalFinalPromo,
                    totalAdesaoBase, descAdesao, totalAdesaoFinal, iCrm, iErp, iAtende
                };
            }, [ancora, regiao, incluirAtende, selCrm, selErp, selAtende, ciclo, descAdesao, promoCrm]);

            const format = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

            return (
                <div className="max-w-7xl mx-auto p-4 py-8 flex flex-col lg:flex-row gap-6">
                    
                    {/* CONTROLES */}
                    <div className="w-full lg:w-2/3 bg-white p-6 md:p-8 rounded-2xl shadow-lg border border-slate-200">
                        <h1 className="text-2xl font-black text-slate-800 mb-6 border-b pb-4">Setup da Proposta</h1>

                        {/* PRODUTO E REGIÃO */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                            <div>
                                <label className="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wide">1. Âncora</label>
                                <div className="grid grid-cols-3 gap-2">
                                    {['CRM', 'ERP', 'AMBOS'].map((i) => (
                                        <button key={i} onClick={() => setAncora(i)}
                                            className={`py-2 px-1 text-sm rounded-lg font-bold transition-all ${ancora === i ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                                            {i === 'AMBOS' ? 'CRM+ERP' : i}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wide">2. Região</label>
                                <div className="grid grid-cols-2 gap-2">
                                    {[{id:'SP', l:'SP'}, {id:'SUL_SUDESTE', l:'Sul/Sudeste'}, {id:'CENTRO_OESTE', l:'Centro-Oeste'}, {id:'NORTE_NORDESTE', l:'Norte/Nordeste'}].map((r) => (
                                        <button key={r.id} onClick={() => setRegiao(r.id)}
                                            className={`py-2 px-1 text-sm rounded-lg font-bold transition-all ${regiao === r.id ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                                            {r.l}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* PLANOS */}
                        <div className="bg-slate-50 p-5 rounded-xl border border-slate-200 mb-8 space-y-4">
                            {(ancora === 'CRM' || ancora === 'AMBOS') && (
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 mb-1">Plano CRM</label>
                                    <select className="w-full p-2.5 border border-slate-300 rounded-lg" value={selCrm} onChange={e => setSelCrm(e.target.value)}>
                                        {bdCrm.map(p => <option key={p.id} value={p.id}>{p.nome}</option>)}
                                    </select>
                                </div>
                            )}
                            {(ancora === 'ERP' || ancora === 'AMBOS') && (
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 mb-1">Plano ERP</label>
                                    <select className="w-full p-2.5 border border-slate-300 rounded-lg" value={selErp} onChange={e => setSelErp(e.target.value)}>
                                        {bdErp.map(p => <option key={p.nome} value={p.nome}>{p.nome}</option>)}
                                    </select>
                                </div>
                            )}
                            <div className="pt-2 border-t border-slate-200 mt-2">
                                <div className="flex items-center justify-between mb-2">
                                    <label className="block text-sm font-bold text-slate-700">Incluir Assistente Atende?</label>
                                    <input type="checkbox" checked={incluirAtende} onChange={e => setIncluirAtende(e.target.checked)} className="w-5 h-5 accent-blue-600" />
                                </div>
                                {incluirAtende && (
                                    <select className="w-full p-2.5 border border-slate-300 rounded-lg" value={selAtende} onChange={e => setSelAtende(e.target.value)}>
                                        {bdAtende.map(p => <option key={p.id} value={p.id}>{p.nome}</option>)}
                                    </select>
                                )}
                            </div>
                        </div>

                        {/* CONDIÇÕES DE FECHAMENTO */}
                        <h2 className="text-lg font-black text-slate-800 mb-4 flex items-center gap-2">
                            🔥 Gatilhos Comerciais de Fechamento
                        </h2>
                        <div className="flex flex-col gap-4 p-5 bg-amber-50 border border-amber-200 rounded-xl">
                            
                            {/* Gatilho 1: CRM Promocional */}
                            {(ancora === 'CRM' || ancora === 'AMBOS') && (
                                <div>
                                    <label className="block text-xs font-bold text-amber-800 mb-2 uppercase tracking-wide">Desconto CRM (Ramp-up Mensalidade)</label>
                                    <div className="flex flex-wrap gap-2">
                                        {[{v: '0_MESES', l: 'Sem Promo'}, {v: '50_3M', l: '50% (3 Meses)'}, {v: '50_6M', l: '50% (6 Meses)'}, {v: '50_9M', l: '50% (9 Meses)'}, {v: '50_12M', l: '50% (12 Meses)'}, {v: '100_ISENCAO', l: 'Isenção 100%'}].map((p) => (
                                            <button key={p.v} onClick={() => setPromoCrm(p.v)}
                                                className={`flex-1 min-w-[100px] py-2 text-xs rounded-lg font-bold border transition-all ${promoCrm === p.v ? 'bg-amber-500 text-white border-amber-600 shadow-md' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50'}`}>
                                                {p.l}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-2">
                                <div>
                                    <label className="block text-xs font-bold text-amber-800 mb-2 uppercase tracking-wide">Ciclo do Contrato</label>
                                    <div className="flex gap-2">
                                        {['Mensal', 'Anual'].map((c) => (
                                            <button key={c} onClick={() => setCiclo(c)}
                                                className={`flex-1 py-2 rounded-lg font-bold border transition-all ${ciclo === c ? 'bg-amber-500 text-white border-amber-600 shadow-md' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50'}`}>
                                                {c} {c === 'Anual' && <span className="block text-[10px] font-normal">-20% OFF</span>}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-amber-800 mb-2 uppercase tracking-wide">Desc. Implantação</label>
                                    <div className="flex gap-1">
                                        {[{v: 0, l: '0%'}, {v: 0.3, l: '30%'}, {v: 0.5, l: '50%'}, {v: 1, l: 'Isento'}].map((d) => (
                                            <button key={d.v} onClick={() => setDescAdesao(d.v)}
                                                className={`flex-1 py-2 text-xs rounded-lg font-bold border transition-all ${descAdesao === d.v ? 'bg-amber-500 text-white border-amber-600 shadow-md' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50'}`}>
                                                {d.l}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* RESUMO FINANCEIRO */}
                    <div className="w-full lg:w-1/3 bg-slate-900 rounded-2xl shadow-2xl flex flex-col border border-slate-700 relative overflow-hidden">
                        
                        {ciclo === 'Anual' && (
                            <div className="bg-amber-500 text-amber-950 text-xs font-black text-center py-1.5 uppercase tracking-widest absolute top-0 w-full left-0 z-10">
                                ⭐ Plano Anual Ativado (-20%)
                            </div>
                        )}

                        <div className={`p-8 flex-grow ${ciclo === 'Anual' ? 'pt-10' : ''}`}>
                            <h2 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">Resumo Financeiro</h2>
                            
                            {/* MENSALIDADE */}
                            <div className="space-y-3 mb-6">
                                {(ancora === 'ERP' || ancora === 'AMBOS') && (
                                    <div className="flex justify-between text-sm text-slate-300"><span>Mensalidade ERP</span><span className="font-medium">{format(valores.mErp)}</span></div>
                                )}
                                {(ancora === 'CRM' || ancora === 'AMBOS') && (
                                    <div className="text-sm text-slate-300">
                                        <div className="flex justify-between mb-1">
                                            <span>Mensalidade CRM</span>
                                            <span className={`${valores.promoCrm !== '0_MESES' ? 'line-through text-slate-500' : 'font-medium'}`}>{format(valores.mCrm)}</span>
                                        </div>
                                        {valores.infoPromo !== '' && (
                                            <div className="flex justify-between text-amber-400 text-xs font-bold">
                                                <span>↳ Desconto Promo ({valores.infoPromo})</span>
                                                <span>{format(valores.mCrmPromocional)}</span>
                                            </div>
                                        )}
                                    </div>
                                )}
                                {incluirAtende && (
                                    <div className="text-sm">
                                        <div className="flex justify-between text-slate-300 mb-1"><span>Assistente Atende</span><span className="font-medium">{format(valores.mAtende)}</span></div>
                                        {valores.descBundlePerc > 0 && (
                                            <div className="flex justify-between text-emerald-400 text-xs font-medium">
                                                <span>↳ Desconto Bundle ({valores.descBundlePerc * 100}%)</span><span>-{format(valores.mAtende * valores.descBundlePerc)}</span>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>

                            {/* TOTAIS RECORRENTES */}
                            <div className="pt-4 border-t border-slate-700 mb-8">
                                
                                {valores.infoPromo !== '' ? (
                                    // VISÃO COM RAMP-UP
                                    <div className="bg-slate-800 p-4 rounded-xl border border-slate-600 relative">
                                        <span className="absolute -top-3 left-3 bg-amber-500 text-amber-950 text-[10px] font-black px-2 py-0.5 rounded-full uppercase">Valor Promocional</span>
                                        <span className="block text-slate-400 text-xs uppercase tracking-wider mb-1 mt-2">Nos primeiros {valores.infoPromo}</span>
                                        <div className="text-4xl font-black text-amber-400 mb-2">
                                            {format(valores.totalMensalFinalPromo)}
                                        </div>
                                        <div className="flex justify-between items-center text-xs text-slate-400 border-t border-slate-700 pt-2">
                                            <span>Mensalidade após promoção:</span>
                                            <span className="font-bold text-white">{format(valores.totalMensalFinalBase)}</span>
                                        </div>
                                    </div>
                                ) : (
                                    // VISÃO NORMAL
                                    <div>
                                        <span className="block text-slate-500 text-xs uppercase tracking-wider mb-1">Investimento Mensal Final</span>
                                        <div className="text-4xl font-black text-white">
                                            {format(valores.totalMensalFinalBase)}
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* ADESÃO */}
                            <div className="bg-slate-800 rounded-xl p-5 border border-slate-700">
                                <h3 className="text-xs font-black text-slate-400 uppercase mb-3">Setup / Implantação</h3>
                                <div className="flex justify-between text-sm text-slate-300 mb-1"><span>Valor Base</span><span>{format(valores.totalAdesaoBase)}</span></div>
                                
                                {valores.descAdesao > 0 && (
                                    <div className="flex justify-between text-emerald-400 text-xs font-bold mb-2">
                                        <span>Desconto Aplicado ({valores.descAdesao * 100}%)</span>
                                        <span>-{format(valores.totalAdesaoBase * valores.descAdesao)}</span>
                                    </div>
                                )}
                                
                                <div className="flex justify-between items-center mt-3 pt-3 border-t border-slate-600 text-white font-bold">
                                    <span>Total a Pagar (Único)</span>
                                    <span className="text-lg">{format(valores.totalAdesaoFinal)}</span>
                                </div>
                            </div>
                        </div>

                        <button className="bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-black py-5 w-full transition-colors text-lg uppercase tracking-wide">
                            Gerar Proposta
                        </button>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
