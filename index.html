<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Propostas - Superlógica</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        super: {
                            green: '#00E38C',      /* Verde Vibrante Superlógica */
                            greenHover: '#00C87A', 
                            dark: '#1A173A',       /* Azul Escuro / Roxo Fundo */
                            darker: '#110F27',
                            blue: '#2C52FE',       /* Azul Institucional */
                            light: '#F8F9FB',      /* Fundo Cinza Claro */
                            gray: '#8D94A2'
                        }
                    }
                }
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-super-light min-h-screen text-slate-800 font-sans selection:bg-super-green selection:text-super-dark">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // --- BANCO DE DADOS ---
        const bdCrm = [
            { id: 'Basic', nome: 'CRM - Basic (150 Imóveis)', mensal: 299, impl: 269 },
            { id: 'Economico', nome: 'CRM - Econômico (300 Imóveis)', mensal: 349, impl: 429 },
            { id: 'Essencial', nome: 'CRM - Essencial (700 Imóveis)', mensal: 599, impl: 739 },
            { id: 'Enterprise', nome: 'CRM - Enterprise (Ilimitado)', mensal: 999, impl: 1059 },
        ];

        const bdAtende = [
            { id: 100, nome: 'Assistente 100', mensal: 350, impl: 700 },
            { id: 200, nome: 'Assistente 200', mensal: 450, impl: 900 },
            { id: 300, nome: 'Assistente 300', mensal: 660, impl: 1320 },
            { id: 400, nome: 'Assistente 400', mensal: 720, impl: 1440 },
            { id: 500, nome: 'Assistente 500', mensal: 850, impl: 1700 },
            { id: 600, nome: 'Assistente 600', mensal: 990, impl: 1980 },
            { id: 700, nome: 'Assistente 700', mensal: 1120, impl: 2240 },
            { id: 800, nome: 'Assistente 800', mensal: 1240, impl: 2480 },
            { id: 900, nome: 'Assistente 900', mensal: 1350, impl: 2700 },
            { id: 1000, nome: 'Assistente 1000', mensal: 1450, impl: 2900 },
        ];

        const gerarBdErp = () => {
            const planos = [
                { nome: 'Basic Plus (Com PJBank) - 25', mensal: 139, adesao: 699 },
                { nome: 'Basic (Sem PJBank) - 25', mensal: 159, adesao: 699 },
                { nome: 'Econômico - 50', mensal: 279, adesao: 699 },
                { nome: 'Econômico Plus - 100', mensal: 389, adesao: 699 },
                { nome: 'Essencial - 200', mensal: 499, adesao: 990 },
            ];
            for(let i = 300; i <= 5000; i += 100) {
                let m = 739 + ((i - 300)/100 * 190);
                if(i === 3600) m = 6876; if(i === 3700) m = 7067; if(i === 3800) m = 7258;
                if(i === 3900) m = 7449; if(i === 4000) m = 7640; if(i === 4100) m = 7831;
                if(i === 4200) m = 8022; if(i === 4300) m = 8213; if(i === 4400) m = 8404;
                if(i === 4500) m = 8595; if(i === 4600) m = 8786; if(i === 4700) m = 8977;
                if(i === 4800) m = 9168; if(i === 4900) m = 9359; if(i === 5000) m = 9550;
                planos.push({ nome: `Enterprise ${i}`, mensal: m, adesao: 1490 });
            }
            return planos;
        };
        const bdErp = gerarBdErp();

        function App() {
            const [ancora, setAncora] = useState('AMBOS');
            const [regiao, setRegiao] = useState('SP');
            const [incluirAtende, setIncluirAtende] = useState(true);
            const [selCrm, setSelCrm] = useState(bdCrm[0].id);
            const [selErp, setSelErp] = useState(bdErp[0].nome);
            const [selAtende, setSelAtende] = useState(bdAtende[0].id);
            const [ciclo, setCiclo] = useState('Mensal');
            const [descAdesao, setDescAdesao] = useState(0); 
            const [promoCrm, setPromoCrm] = useState('0_MESES'); 

            const valores = useMemo(() => {
                let mCrm = 0, iCrm = 0, mErp = 0, iErp = 0, mAtende = 0, iAtende = 0;
                let descBundlePerc = 0;

                if (ancora === 'ERP' || ancora === 'AMBOS') {
                    const p = bdErp.find(x => x.nome === selErp);
                    mErp = p.mensal; iErp = p.adesao;
                }
                if (ancora === 'CRM' || ancora === 'AMBOS') {
                    const p = bdCrm.find(x => x.id === selCrm);
                    mCrm = p.mensal; iCrm = p.impl;
                }
                if (incluirAtende) {
                    const p = bdAtende.find(x => x.id === Number(selAtende));
                    mAtende = p.mensal; iAtende = p.impl;
                    const regras = {
                        CRM: { SP: 0.20, SUL_SUDESTE: 0.40, CENTRO_OESTE: 0.40, NORTE_NORDESTE: 0.70 },
                        ERP: { SP: 0.00, SUL_SUDESTE: 0.80, CENTRO_OESTE: 0.90, NORTE_NORDESTE: 1.00 },
                        AMBOS: { SP: 0.50, SUL_SUDESTE: 0.90, CENTRO_OESTE: 1.00, NORTE_NORDESTE: 1.00 }
                    };
                    descBundlePerc = regras[ancora][regiao];
                }

                const mAtendeFinal = mAtende - (mAtende * descBundlePerc);
                
                let mCrmPromocional = mCrm;
                let infoPromo = '';
                let mesesPromo = 0;
                
                if (ancora === 'CRM' || ancora === 'AMBOS') {
                    if (promoCrm === '50_3M') { mCrmPromocional = mCrm * 0.5; infoPromo = '3 meses'; mesesPromo = 3; }
                    else if (promoCrm === '50_6M') { mCrmPromocional = mCrm * 0.5; infoPromo = '6 meses'; mesesPromo = 6; }
                    else if (promoCrm === '50_9M') { mCrmPromocional = mCrm * 0.5; infoPromo = '9 meses'; mesesPromo = 9; }
                    else if (promoCrm === '50_12M') { mCrmPromocional = mCrm * 0.5; infoPromo = '12 meses'; mesesPromo = 12; }
                    else if (promoCrm === '100_ISENCAO') { mCrmPromocional = 0; infoPromo = 'Vitalícia'; mesesPromo = 12; }
                }

                // Subtotais Diários/Mensais
                const subtotalMensalBase = mCrm + mErp + mAtendeFinal; 
                const subtotalMensalPromo = mCrmPromocional + mErp + mAtendeFinal; 

                const descCicloPerc = ciclo === 'Anual' ? 0.20 : 0;
                const totalMensalFinalBase = subtotalMensalBase - (subtotalMensalBase * descCicloPerc); 
                const totalMensalFinalPromo = subtotalMensalPromo - (subtotalMensalPromo * descCicloPerc); 

                const totalAdesaoBase = iCrm + iErp + (incluirAtende ? iAtende : 0);
                const totalAdesaoFinal = totalAdesaoBase - (totalAdesaoBase * descAdesao);

                // === CÁLCULO DE ECONOMIA ANUAL (12 MESES) ===
                const custoAnoMensal = (subtotalMensalPromo * mesesPromo) + (subtotalMensalBase * (12 - mesesPromo));
                const custoAnoComDescontoAnual = custoAnoMensal * 0.8; // Se fechar anual, paga 80% do valor do ano
                const economiaAnualValor = custoAnoMensal - custoAnoComDescontoAnual;

                return {
                    mCrm, mCrmPromocional, infoPromo, mErp, mAtende, mAtendeFinal, descBundlePerc,
                    subtotalMensalBase, subtotalMensalPromo, descCicloPerc, 
                    totalMensalFinalBase, totalMensalFinalPromo,
                    totalAdesaoBase, descAdesao, totalAdesaoFinal,
                    custoAnoMensal, custoAnoComDescontoAnual, economiaAnualValor
                };
            }, [ancora, regiao, incluirAtende, selCrm, selErp, selAtende, ciclo, descAdesao, promoCrm]);

            const format = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

            return (
                <div className="max-w-7xl mx-auto p-4 py-10 flex flex-col lg:flex-row gap-8">
                    
                    {/* CONTROLES (Painel Claro) */}
                    <div className="w-full lg:w-2/3 bg-white p-6 md:p-10 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100">
                        
                        {/* Header com Logo Textual */}
                        <div className="flex items-center justify-between mb-8 pb-6 border-b border-slate-100">
                            <div>
                                <h1 className="text-3xl font-extrabold text-slate-900 tracking-tight">Simulador<span className="text-super-blue">.</span></h1>
                                <p className="text-super-gray text-sm mt-1 font-medium">Configure a melhor proposta para o cliente</p>
                            </div>
                        </div>

                        {/* PRODUTO E REGIÃO */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
                            <div>
                                <label className="block text-[11px] font-bold text-super-gray mb-3 uppercase tracking-widest">1. Produto Âncora</label>
                                <div className="grid grid-cols-3 gap-2">
                                    {['CRM', 'ERP', 'AMBOS'].map((i) => (
                                        <button key={i} onClick={() => setAncora(i)}
                                            className={`py-3 px-1 text-sm rounded-xl font-bold transition-all duration-200 ${ancora === i ? 'bg-super-blue text-white shadow-lg shadow-super-blue/30' : 'bg-slate-50 text-slate-600 hover:bg-slate-100 border border-slate-200'}`}>
                                            {i === 'AMBOS' ? 'CRM+ERP' : i}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <label className="block text-[11px] font-bold text-super-gray mb-3 uppercase tracking-widest">2. Região</label>
                                <div className="grid grid-cols-2 gap-2">
                                    {[{id:'SP', l:'SP'}, {id:'SUL_SUDESTE', l:'Sul/Sudeste'}, {id:'CENTRO_OESTE', l:'Centro-Oeste'}, {id:'NORTE_NORDESTE', l:'Norte/Nordeste'}].map((r) => (
                                        <button key={r.id} onClick={() => setRegiao(r.id)}
                                            className={`py-3 px-1 text-sm rounded-xl font-bold transition-all duration-200 ${regiao === r.id ? 'bg-super-blue text-white shadow-lg shadow-super-blue/30' : 'bg-slate-50 text-slate-600 hover:bg-slate-100 border border-slate-200'}`}>
                                            {r.l}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* PLANOS */}
                        <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100 mb-10 space-y-5">
                            {(ancora === 'CRM' || ancora === 'AMBOS') && (
                                <div>
                                    <label className="block text-sm font-bold text-slate-800 mb-2">Plano CRM</label>
                                    <select className="w-full p-3.5 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-super-blue focus:border-super-blue outline-none transition-all font-medium text-slate-700" value={selCrm} onChange={e => setSelCrm(e.target.value)}>
                                        {bdCrm.map(p => <option key={p.id} value={p.id}>{p.nome}</option>)}
                                    </select>
                                </div>
                            )}
                            {(ancora === 'ERP' || ancora === 'AMBOS') && (
                                <div>
                                    <label className="block text-sm font-bold text-slate-800 mb-2">Plano ERP</label>
                                    <select className="w-full p-3.5 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-super-blue focus:border-super-blue outline-none transition-all font-medium text-slate-700" value={selErp} onChange={e => setSelErp(e.target.value)}>
                                        {bdErp.map(p => <option key={p.nome} value={p.nome}>{p.nome}</option>)}
                                    </select>
                                </div>
                            )}
                            <div className="pt-4 border-t border-slate-200 mt-2">
                                <div className="flex items-center justify-between mb-3">
                                    <label className="block text-sm font-bold text-slate-800">Incluir Assistente Atende?</label>
                                    <input type="checkbox" checked={incluirAtende} onChange={e => setIncluirAtende(e.target.checked)} className="w-6 h-6 rounded text-super-blue focus:ring-super-blue" />
                                </div>
                                {incluirAtende && (
                                    <select className="w-full p-3.5 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-super-blue outline-none transition-all font-medium text-slate-700" value={selAtende} onChange={e => setSelAtende(e.target.value)}>
                                        {bdAtende.map(p => <option key={p.id} value={p.id}>{p.nome}</option>)}
                                    </select>
                                )}
                            </div>
                        </div>

                        {/* GATILHOS */}
                        <div className="flex items-center gap-2 mb-5">
                            <div className="h-6 w-1.5 bg-super-green rounded-full"></div>
                            <h2 className="text-xl font-bold text-slate-900">Gatilhos Comerciais</h2>
                        </div>
                        
                        <div className="flex flex-col gap-5 p-6 bg-white border-2 border-slate-100 rounded-2xl shadow-sm">
                            
                            {(ancora === 'CRM' || ancora === 'AMBOS') && (
                                <div>
                                    <label className="block text-[11px] font-bold text-super-gray mb-3 uppercase tracking-widest">Ramp-up CRM</label>
                                    <div className="flex flex-wrap gap-2">
                                        {[{v: '0_MESES', l: 'Sem Promo'}, {v: '50_3M', l: '50% (3 Meses)'}, {v: '50_6M', l: '50% (6 Meses)'}, {v: '50_9M', l: '50% (9 Meses)'}, {v: '50_12M', l: '50% (12 M)'}, {v: '100_ISENCAO', l: 'Isento'}].map((p) => (
                                            <button key={p.v} onClick={() => setPromoCrm(p.v)}
                                                className={`flex-1 min-w-[90px] py-2.5 text-xs rounded-lg font-bold border transition-all ${promoCrm === p.v ? 'bg-super-dark text-white border-super-dark shadow-md' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}>
                                                {p.l}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-2">
                                <div>
                                    <label className="block text-[11px] font-bold text-super-gray mb-3 uppercase tracking-widest">Ciclo do Contrato</label>
                                    <div className="flex gap-2 bg-slate-100 p-1 rounded-xl">
                                        {['Mensal', 'Anual'].map((c) => (
                                            <button key={c} onClick={() => setCiclo(c)}
                                                className={`flex-1 py-2.5 rounded-lg font-bold text-sm transition-all ${ciclo === c ? 'bg-white text-super-blue shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                                {c} {c === 'Anual' && <span className="block text-[10px] text-super-green font-extrabold">-20% OFF</span>}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-[11px] font-bold text-super-gray mb-3 uppercase tracking-widest">Desconto Adesão</label>
                                    <div className="flex gap-2 bg-slate-100 p-1 rounded-xl">
                                        {[{v: 0, l: '0%'}, {v: 0.3, l: '30%'}, {v: 0.5, l: '50%'}, {v: 1, l: '100%'}].map((d) => (
                                            <button key={d.v} onClick={() => setDescAdesao(d.v)}
                                                className={`flex-1 py-2.5 text-xs rounded-lg font-bold transition-all ${descAdesao === d.v ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                                {d.l}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* RESUMO FINANCEIRO (Painel Escuro Superlógica) */}
                    <div className="w-full lg:w-1/3 bg-super-dark rounded-3xl shadow-2xl flex flex-col relative overflow-hidden h-fit">
                        
                        {ciclo === 'Anual' && (
                            <div className="bg-super-green text-super-darker text-[11px] font-black text-center py-2 uppercase tracking-widest w-full z-10">
                                ⭐ Plano Anual Aplicado (-20%)
                            </div>
                        )}

                        <div className="p-8 md:p-10 pb-6 flex-grow text-white">
                            <h2 className="text-[11px] font-bold text-super-gray uppercase tracking-widest mb-8">Resumo da Proposta</h2>
                            
                            {/* MENSALIDADE */}
                            <div className="space-y-4 mb-8">
                                {(ancora === 'ERP' || ancora === 'AMBOS') && (
                                    <div className="flex justify-between text-sm">
                                        <span className="text-slate-400">Mensalidade ERP</span>
                                        <span className="font-semibold">{format(valores.mErp)}</span>
                                    </div>
                                )}
                                {(ancora === 'CRM' || ancora === 'AMBOS') && (
                                    <div className="text-sm">
                                        <div className="flex justify-between mb-1">
                                            <span className="text-slate-400">Mensalidade CRM</span>
                                            <span className={`${valores.promoCrm !== '0_MESES' ? 'line-through text-slate-600' : 'font-semibold'}`}>{format(valores.mCrm)}</span>
                                        </div>
                                        {valores.infoPromo !== '' && (
                                            <div className="flex justify-between text-super-green font-bold text-xs mt-1">
                                                <span>↳ Desconto Promo ({valores.infoPromo})</span>
                                                <span>{format(valores.mCrmPromocional)}</span>
                                            </div>
                                        )}
                                    </div>
                                )}
                                {incluirAtende && (
                                    <div className="text-sm">
                                        <div className="flex justify-between mb-1">
                                            <span className="text-slate-400">Assistente Atende</span>
                                            <span className="font-semibold">{format(valores.mAtende)}</span>
                                        </div>
                                        {valores.descBundlePerc > 0 && (
                                            <div className="flex justify-between text-super-green font-bold text-xs mt-1">
                                                <span>↳ Bundle ({valores.descBundlePerc * 100}%)</span>
                                                <span>-{format(valores.mAtende * valores.descBundlePerc)}</span>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>

                            {/* TOTAIS RECORRENTES */}
                            <div className="pt-6 border-t border-slate-700/50 mb-8">
                                {valores.infoPromo !== '' ? (
                                    <div className="bg-super-darker p-5 rounded-2xl border border-slate-700/50 relative">
                                        <span className="absolute -top-3 left-4 bg-super-green text-super-darker text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-wider">Valor Promocional</span>
                                        <span className="block text-slate-400 text-[11px] uppercase tracking-widest mb-1 mt-2">Investimento Inicial</span>
                                        <div className="text-4xl md:text-5xl font-black text-white mb-3 tracking-tighter">
                                            {format(valores.totalMensalFinalPromo)}
                                        </div>
                                        <div className="flex justify-between items-center text-xs text-slate-400 border-t border-slate-700/50 pt-3 mt-2">
                                            <span>Após {valores.infoPromo}:</span>
                                            <span className="font-bold text-white">{format(valores.totalMensalFinalBase)}</span>
                                        </div>
                                    </div>
                                ) : (
                                    <div>
                                        <span className="block text-super-gray text-[11px] uppercase tracking-widest mb-2">Investimento Recorrente</span>
                                        <div className="text-4xl md:text-5xl font-black text-white tracking-tighter">
                                            {format(valores.totalMensalFinalBase)}
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* ADESÃO */}
                            <div className="bg-super-darker rounded-2xl p-6 border border-slate-700/50">
                                <h3 className="text-[11px] font-bold text-super-gray uppercase tracking-widest mb-4">Setup & Implantação</h3>
                                <div className="flex justify-between text-sm text-slate-400 mb-2">
                                    <span>Valor Tabela</span>
                                    <span>{format(valores.totalAdesaoBase)}</span>
                                </div>
                                
                                {valores.descAdesao > 0 && (
                                    <div className="flex justify-between text-super-green text-xs font-bold mb-3">
                                        <span>Desconto ({valores.descAdesao * 100}%)</span>
                                        <span>-{format(valores.totalAdesaoBase * valores.descAdesao)}</span>
                                    </div>
                                )}
                                
                                <div className="flex justify-between items-center mt-4 pt-4 border-t border-slate-700/50 font-bold">
                                    <span className="text-sm">Total Único</span>
                                    <span className="text-xl text-white">{format(valores.totalAdesaoFinal)}</span>
                                </div>
                            </div>
                        </div>

                        {/* NOVO: COMPARATIVO DE ECONOMIA ANUAL */}
                        <div className="p-8 pt-0 mt-auto">
                            <div className="bg-gradient-to-br from-super-green to-super-greenHover rounded-2xl p-6 text-super-darker relative overflow-hidden shadow-[0_0_30px_rgba(0,227,140,0.15)]">
                                {/* Brilho suave de fundo */}
                                <div className="absolute -right-10 -top-10 w-32 h-32 bg-white opacity-20 rounded-full blur-2xl"></div>
                                
                                <h3 className="text-[11px] font-black uppercase tracking-widest mb-4 opacity-90 text-center flex items-center justify-center gap-1.5">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    Impacto em 12 Meses
                                </h3>
                                
                                <div className="space-y-2 mb-4">
                                    <div className="flex justify-between items-center text-sm font-semibold opacity-80">
                                        <span>Pagando mensalmente:</span>
                                        <span className={`${ciclo === 'Anual' ? 'line-through' : ''}`}>{format(valores.custoAnoMensal)}</span>
                                    </div>
                                    <div className="flex justify-between items-center text-sm font-bold">
                                        <span>Custo total no Anual:</span>
                                        <span>{format(valores.custoAnoComDescontoAnual)}</span>
                                    </div>
                                </div>
                                
                                <div className="border-t border-super-darker/20 pt-4 text-center">
                                    <span className="block text-[11px] font-bold uppercase tracking-widest mb-1 opacity-90">Economia Garantida no Ano</span>
                                    <div className="text-4xl font-black tracking-tighter">
                                        {format(valores.economiaAnualValor)}
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
